name: Simulation Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog
      - name: Run testbenches
        run: cd sim && make
